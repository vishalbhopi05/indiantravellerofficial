<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e07a3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0612b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="compass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0e0d0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="245" fill="url(#bg)" />
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.3" />
  <!-- Globe lines (horizontal) -->
  <ellipse cx="256" cy="256" rx="140" ry="140" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.2"/>
  <ellipse cx="256" cy="256" rx="140" ry="80" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.2"/>
  <ellipse cx="256" cy="256" rx="140" ry="35" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.2"/>
  <!-- Globe lines (vertical) -->
  <ellipse cx="256" cy="256" rx="80" ry="140" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.2"/>
  <ellipse cx="256" cy="256" rx="35" ry="140" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.2"/>
  <!-- Compass needle (N-S) -->
  <polygon points="256,116 270,246 256,256 242,246" fill="url(#compass)" />
  <polygon points="256,396 270,266 256,256 242,266" fill="#ffffff" opacity="0.5" />
  <!-- Compass needle (E-W) -->
  <polygon points="396,256 266,242 256,256 266,270" fill="#ffffff" opacity="0.5" />
  <polygon points="116,256 246,242 256,256 246,270" fill="url(#compass)" />
  <!-- Center dot -->
  <circle cx="256" cy="256" r="14" fill="#ffffff" />
  <circle cx="256" cy="256" r="8" fill="url(#bg)" />
  <!-- Cardinal directions -->
  <text x="256" y="102" text-anchor="middle" fill="#ffffff" font-family="Arial,sans-serif" font-size="36" font-weight="bold">N</text>
  <text x="256" y="418" text-anchor="middle" fill="#ffffff" font-family="Arial,sans-serif" font-size="32" font-weight="bold" opacity="0.6">S</text>
  <text x="410" y="266" text-anchor="middle" fill="#ffffff" font-family="Arial,sans-serif" font-size="32" font-weight="bold" opacity="0.6">E</text>
  <text x="102" y="266" text-anchor="middle" fill="#ffffff" font-family="Arial,sans-serif" font-size="32" font-weight="bold" opacity="0.6">W</text>
</svg>
